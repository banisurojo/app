
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BUQis SD</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%231b3027' d='M256 0c4.6 0 9.2 1 13.4 2.9L457.7 82.8c22 9.3 38.4 31 38.3 57.2c-.5 99.2-41.3 280.7-213.6 363.2c-16.7 8-36.1 8-52.8 0C57.3 420.7 16.5 239.2 16 140c-.1-26.2 16.3-47.9 38.3-57.2L242.7 2.9C246.8 1 251.4 0 256 0z'/></svg>">

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#244034">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
    /* ===============================
       CANGKANG MATI (RIGID FRAME)
       =============================== */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh; /* Menggunakan Dynamic Viewport Height */
      background-color: #eee;
      overflow: hidden; /* KUNCI MATI SCROLL DI SINI */
      overscroll-behavior: none; /* Cegah efek karet (bounce) di HP */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .iframe-container {
      width: 100%;
      height: 100dvh;
      display: flex;
    }

    iframe {
      flex: 1; /* Biarkan iframe mengisi sisa ruang mutlak */
      width: 100%;
      height: 100%;
      border: none;
      background-color: transparent;
    }

    /* LOADING OVERLAY */
    .loading {
      position: fixed;
      inset: 0;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #555;
      z-index: 9999;
    }

    .loading.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">Memuat aplikasi…</div>
  <div class="iframe-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbxpKU8NVlm-8sVblIDYACA6yqlU5nrwTylkS1OMcUahFiN_0lDQJC-8p7zZIU1YUMmB/exec"
      allowfullscreen
      loading="eager">
    </iframe>
  </div>
 
  <script>
    const iframe = document.getElementById('appFrame');
    const loading = document.getElementById('loading');

    iframe.addEventListener('load', () => {
      loading.classList.add('hidden');
    });

    // DAFTARKAN SERVICE WORKER UNTUK MENGAKTIFKAN PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker Terdaftar'))
          .catch(err => console.log('Gagal daftar SW', err));
      });
    }
  </script>

</body>
</html>
